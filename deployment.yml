apiVersion: apps/v1
kind: Deployment
metadata:
  name: fullstack-deployment
spec:
  selector:
    matchLabels:
      app: fullstack
  replicas: 3
  template:
    metadata:
      labels:
        app: fullstack
    spec:
      containers:
      - name: fullstack
        image: replace
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        resources:
          requests:
            memory: "256Mi"
            cpu: "500m"
          limits:
            memory: "512Mi"
            cpu: "1"
---
apiVersion: v1
kind: Service
metadata:
  name: fullstack-service # Updated name for clarity
spec:
  selector:
    app: fullstack
  ports:
  - protocol: "TCP"
    port: 80
    targetPort: 8080
  type: LoadBalancer
